name: Aethos CI

on:
  pull_request:
  push:
    branches:
      - main
      - feature/**

jobs:
  calculation-service:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/calculation
    env:
      AETHOS_CALC_PROVIDER: swiss
      AETHOS_SWISS_EPHEMERIS_MODE: moshier
      AETHOS_ALLOW_DEMO_FALLBACK: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.txt -r requirements-swiss.txt
      - run: pytest -v
      - name: Golden charts (explicit)
        run: pytest tests/test_golden_charts.py -v

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
